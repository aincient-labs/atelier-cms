# Curated provider + model recommendations that guide the onboarding pickers.
#
# Backend-owned REFERENCE DATA (not config) — a plain file we hand-maintain as we
# test more models. Loaded by \Drupal\aincient_core\ModelRecommendations. Editing
# this file needs only a cache clear, never a config import.
#
# Keys are drupal/ai provider PLUGIN ids (the INDIVIDUAL plugin, not the collapsed
# UI group): anthropic, openai, openrouter, gemini, nanobanana, ollama — the same
# ids used in aincient_core.model_roles bindings and ModelRoles::tierHints().
#
#   providers:  <provider id> => recommended | tested | not-recommended
#   models:     <provider id> => { <label>: [ordered substring needles] }
#
# A model id is matched case-insensitively; its label is the one whose needle is
# the LONGEST match (so "gpt-4o-mini" beats the shorter "gpt-4o"), ties breaking
# toward the better label. A model matching no needle is "untested". Labels used:
# recommended | tested | not-recommended.

providers:
  anthropic: recommended
  openai: tested
  gemini: tested
  nanobanana: tested
  ollama: tested

# Recommended set is deliberately narrow — the models we actively back per role:
#   High thinking → Sonnet   Task executor / Fast → Haiku
#   Image description (vision) → Sonnet   Image generation → Gemini 2.5 Flash (image)
# Everything else stays connectable but sits at "tested", not "recommended".
models:
  anthropic:
    recommended: [sonnet, haiku]
    tested: [opus]
    not-recommended: []
  openai:
    recommended: []
    tested: [gpt-4o, gpt-4.1, gpt-4o-mini, o3, o1]
    not-recommended: [gpt-3.5]
  # Gemini chat models carry no label (untested) — the only backed Gemini is the
  # nanobanana image model below (Gemini 2.5 Flash, image generation).
  gemini:
    recommended: []
    tested: []
    not-recommended: []
  nanobanana:
    recommended: [gemini-2.5-flash-image]
    tested: []
    not-recommended: []
  openrouter:
    recommended: [sonnet, haiku]
    tested: [gpt-4o, gemini-2.5]
    not-recommended: []
