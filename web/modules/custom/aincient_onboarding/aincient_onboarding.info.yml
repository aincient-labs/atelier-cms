name: 'AIncient Onboarding'
type: module
description: 'Deterministic first-run wizard to connect AI: pick any provider and validate its credential before the agent is usable, then bind a model to each AIncient model role. Surfaced as a full-screen wizard (and an in-chat gen-UI widget) driven by a deterministic FlowDrop workflow; secrets are stored via the Key module in Drupal State (never in config/git).'
package: AIncient
core_version_requirement: ^11
dependencies:
  - ai:ai
  - key:key
  - aincient:aincient_core
