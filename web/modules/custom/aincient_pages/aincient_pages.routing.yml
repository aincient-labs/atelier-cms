# Spike routes: render a hand-authored brief (simulating the agent's output).
aincient_pages.landing:
  path: '/spike/landing'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageSpikeController::render'
    brief: landing
    _title: 'AIncient — landing spike'
  requirements:
    _access: 'TRUE'

aincient_pages.blog:
  path: '/spike/blog'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageSpikeController::render'
    brief: blog
    _title: 'AIncient — blog spike'
  requirements:
    _access: 'TRUE'

# Component showcase: every placeable section + the grid layout container, so
# the full library can be eyeballed (and reskinned by the live brand) at once.
aincient_pages.showcase:
  path: '/spike/showcase'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageSpikeController::render'
    brief: showcase
    _title: 'AIncient — component showcase'
  requirements:
    _access: 'TRUE'

# Brand demo: a self-referential showcase that exercises the full token set
# across all tones — the canonical target for live brand preview.
aincient_pages.brand_demo:
  path: '/demo/brand'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageSpikeController::render'
    brief: brand-demo
    _title: 'AIncient — brand demo'
  requirements:
    _access: 'TRUE'

# NOTE: aincient_page nodes render chrome-less at their OWN node canonical
# (/node/{nid} + pathauto alias) via PageRouteSubscriber, so metatag/pathauto
# apply natively. There is no separate /page route. Pages are edited through
# the chat console's page studio (preview/apply/save below), not a backend form.

# JSON token manifest for the chat console's live brand editor (metadata +
# current value per token). Read-only; the frontend previews edits client-side.
aincient_pages.brand_manifest:
  path: '/atelier/brand/manifest'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\BrandController::manifest'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio design_system'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Publish the brand studio's working token diff — the console's one deliberate
# global write. The picker + studio edit a preview-only draft; this is the only
# thing that persists, through the same BrandRepository path the form/AI tool
# use, so it records an attributed, reversible revision. Gated like the manifest.
aincient_pages.brand_save:
  path: '/atelier/brand/save'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\BrandController::save'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio design_system'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Persist the brand design-intent status (stage + lock) IMMEDIATELY — separate
# from brand_save because status is a MODE, not draft content, so it does not
# ride the token draft→Publish cycle. Gated like the manifest/save.
aincient_pages.brand_status:
  path: '/atelier/brand/status'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\BrandController::setStatus'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio design_system'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# ── Globals studios API (chat console) ──────────────────────────────────────
# The chrome parallel of the brand/page studio API: the Header/Footer/Brand-
# identity studios edit a preview-only draft (chrome layout + identity + the two
# chrome menus); preview renders it without persisting; save is the one
# deliberate write (layout + identity + menu reconciliation). Gated like brand.

# Current chrome state + the editing vocabulary (layout enums, identity, menus).
aincient_pages.chrome_manifest:
  path: '/atelier/chrome/manifest'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\ChromeController::manifest'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio globals'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Render the chrome around a placeholder body from the draft (iframe srcdoc). No write.
aincient_pages.chrome_preview:
  path: '/atelier/chrome/preview'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\ChromeController::preview'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio globals'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Publish the chrome draft: layout + identity + reconcile the main/footer menus.
aincient_pages.chrome_save:
  path: '/atelier/chrome/save'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\ChromeController::save'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio globals'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# NOTE: logo/favicon uploads no longer have bespoke endpoints — they go through
# the unified reference picker (/atelier/media/upload → a `media:<id>` token),
# and the token is persisted by chrome_save. (Library IA increment #3c.)

# ── Page studio API (chat console) ──────────────────────────────────────────
# Mirror of the brand studio API: the studio edits a preview-only page-schema
# draft client-side; preview renders it without persisting; save is the one
# deliberate write. Gated like the brand endpoints.

# Apply the page agent's ops to the working draft (PageStore::applyOps). No write.
aincient_pages.page_apply:
  path: '/atelier/page/apply'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::apply'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Render a draft page-schema to chrome-less HTML (studio iframe srcdoc). No write.
aincient_pages.page_preview:
  path: '/atelier/page/preview'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::preview'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Save the studio's working draft (editorial workflow): persists a forward draft
# revision — does NOT publish. Create a new draft page or update one.
aincient_pages.page_save:
  path: '/atelier/page/save'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::save'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Editorial transitions for a page (the decoupled "go live" + review lifecycle).
# All gated at the route by the broad console permission; the per-transition
# permission (publish/approve/…) is enforced in the store against the user's
# legal transitions. publish = write-latest-then-go-live.
aincient_pages.page_publish:
  path: '/atelier/page/publish'
  defaults:
