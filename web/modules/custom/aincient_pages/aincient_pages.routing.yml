    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# The stored schema for an existing page — the "edit this page" entry point.
aincient_pages.page_schema:
  path: '/atelier/page/{node}/schema'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::pageSchema'
  methods: [GET]
  requirements:
