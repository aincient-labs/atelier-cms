    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      node:
        type: 'entity:node'

# Re-inherit the source layout for a translation (asymmetric → symmetric). Always
# allowed (re-inheriting is never a governance risk). Body: { "langcode": "<lc>" }.
aincient_pages.page_converge:
  path: '/atelier/page/{node}/converge'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::converge'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
