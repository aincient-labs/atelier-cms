# ── Unified reference API (chat console) ────────────────────────────────────
# One SEARCH + one DESCRIBE over every referenceable type (media, nodes, blocks —
# Users/Brand later), behind the studio's <ReferenceField> and the agent's
# find_reference tool. Pickers write back the type's text TOKEN (media:<id> /
# entity:node:<id> / block:<id>); resolve drives the in-field preview. Gated like
# the page endpoints.

# Search pickable references across types (?types=media,node,block&q=…).
aincient_pages.reference_search:
  path: '/atelier/reference/search'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\ReferenceController::search'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Resolve one stored token to a descriptor for the in-field preview (?token=…).
aincient_pages.reference_resolve:
  path: '/atelier/reference/resolve'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\ReferenceController::resolve'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# ── Media upload (chat console) ─────────────────────────────────────────────
# The one media-specific write — creating an image from an upload. (Browse +
# preview go through the unified reference API above; the agent's find_reference
# tool reads the same library.)

# Upload a new image into the library (multipart: file + optional alt).
aincient_pages.media_upload:
  path: '/atelier/media/upload'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::upload'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
    # route normalizer 301 these: a 301 on a POST drops the body and breaks the
    # call. Language is always an explicit `langcode` param, never negotiated.
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# Resolve a media token to a display-sized derivative (?token=…&style=…) — the
# Presence preview cards render at real card size, where a picker thumb is blurry.
aincient_pages.media_url:
  path: '/atelier/media/url'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::url'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

# The editable detail of one image — the "open this media item" entry point for
# the media studio's non-AI editor rail (mirror of block_schema).
aincient_pages.media_schema:
  path: '/atelier/media/{media}/schema'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::detail'
  methods: [GET]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      media:
        type: 'entity:media'

# Update an image's name / alt text (the editor rail's Save).
aincient_pages.media_save:
  path: '/atelier/media/{media}'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::save'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      media:
        type: 'entity:media'

# Swap an image's underlying file, keeping the same media:<id> token.
aincient_pages.media_replace:
  path: '/atelier/media/{media}/file'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::replaceFile'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      media:
        type: 'entity:media'

# Overwrite an image with ANOTHER item's bytes (commit an edit onto the original),
# keeping the target's media:<id> token.
aincient_pages.media_replace_from:
  path: '/atelier/media/{media}/replace-from'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::replaceFrom'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      media:
        type: 'entity:media'

# Delete an image-media item (the human's explicit discard of an unwanted asset).
aincient_pages.media_delete:
  path: '/atelier/media/{media}/delete'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\MediaController::delete'
  methods: [POST]
  requirements:
    _permission: 'use aincient studio content'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']
    parameters:
      media:
        type: 'entity:media'

