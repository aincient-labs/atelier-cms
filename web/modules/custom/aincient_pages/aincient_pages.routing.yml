# Flip a page translation to its OWN (asymmetric) layout — copy-on-write. Gated
# by the divergence permission (it detaches the translation from source layout
# edits). Body: { "langcode": "<lc>" }.
aincient_pages.page_diverge:
  path: '/atelier/page/{node}/diverge'
  defaults:
    _controller: '\Drupal\aincient_pages\Controller\PageController::diverge'
  methods: [POST]
  requirements:
    _permission: 'diverge aincient page layout'
  options:
    # JSON/data API for the console SPA — never let a (future) redirect-module
