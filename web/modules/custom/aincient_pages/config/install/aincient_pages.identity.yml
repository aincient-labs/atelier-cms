# Brand identity (a Globals item): who the site IS — name, voice, logo, footer
# note. Distinct from the design-token Foundations layer (aincient_pages.brand).
# Consumed by the site header/footer and the page agent's brief. Empty by
# default; values land here when a user edits the brand.
#
# logo/favicon are `media:<id>` TOKENS (the unified Library picker's value), or ''
# for none — the same universal media token used everywhere else (DECISIONS 0127).
guidelines:
  name: ''
  tagline: ''
  description: ''
  tone: ''
logo: ''
favicon: ''
footer_note: ''
# Site information (DECISIONS 0183): the operator-owned slice of core's
# system.site. Empty values mean "no opinion" — the shipped system.site default
# shows through (SiteInformationOverrider only overrides non-empty values). The
# page slots are `entity:node:<id>` reference tokens (the unified picker's
# value), resolved to internal paths at config-read time.
site:
  mail: ''
  front: ''
  page_403: ''
  page_404: ''
