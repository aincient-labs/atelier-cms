name: Team
status: experimental
group: 'AIncient Landing'
description: 'The people behind the company — head-shots, names, roles. columns reflow the grid.'
props:
  type: object
  properties:
    tone:
      type: string
      enum: [default, muted, brand, inverted]
      default: default
    eyebrow: { type: string }
    heading: { type: string }
    subheading: { type: string }
    columns:
      type: integer
      enum: [2, 3, 4]
      default: 3
    members:
      type: array
      description: 'Array of { name, role, bio, avatar }. role/bio/avatar optional.'
