name: Testimonials
status: experimental
group: 'AIncient Landing'
description: 'Customer quotes — social proof in their own words. columns reflow the cards.'
props:
  type: object
  properties:
    tone:
      type: string
      enum: [default, muted, brand, inverted]
      default: default
    eyebrow: { type: string }
    heading: { type: string }
    subheading: { type: string }
    columns:
      type: integer
      enum: [2, 3]
      default: 3
    quotes:
      type: array
      description: 'Array of { quote, author, role, avatar }. avatar/role optional.'
