name: FAQ
status: experimental
group: 'AIncient Landing'
description: 'Frequently-asked questions in a native disclosure list (no JS).'
props:
  type: object
  properties:
    tone:
      type: string
      enum: [default, muted, brand, inverted]
      default: default
    eyebrow: { type: string }
    heading: { type: string }
    subheading: { type: string }
    questions:
      type: array
      description: 'Array of { question, answer }.'
