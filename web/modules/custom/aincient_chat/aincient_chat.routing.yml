aincient_chat.console:
  path: '/atelier'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ConsoleController::app'
    _title: 'Atelier'
  requirements:
    _permission: 'use aincient operator console'

# Bookmarkable console deep links (room-primary URLs, decision D3). All serve the
# same chrome-less SPA shell — the bundle reads the ROOM from the path client-side
# (chat-ui/src/console-url.ts). The room owns the path; the active thread rides as
# a ?thr= query (no thread path segment). Three shapes beyond the bare /atelier:
#
#   /atelier/<studio>                          a studio landing / the Content list
#   /atelier/<studio>/<node|block>/<nid>       a Content page/block, or a Checks
#                                               audit (/atelier/checks/node/<nid>)
#   /atelier/<studio>/node/<nid>/<langcode>    a page translation
#
# The (?!chat$) lookahead on <studio> keeps these dynamic wildcards from shadowing
# the all-literal /atelier/chat* API routes. Drupal already orders static routes
# ahead of dynamic ones, and the API paths are all longer / method-scoped, so this
# is belt-and-braces (plus doc_type=node|block and nid=\d+ narrow it further).
aincient_chat.console_studio:
  path: '/atelier/{studio}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ConsoleController::app'
    _title: 'Atelier'
  requirements:
    _permission: 'use aincient operator console'
    studio: '(?!chat$)[a-z][a-z0-9_-]*'

aincient_chat.console_doc:
  path: '/atelier/{studio}/{doc_type}/{nid}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ConsoleController::app'
    _title: 'Atelier'
  requirements:
    _permission: 'use aincient operator console'
    studio: '(?!chat$)[a-z][a-z0-9_-]*'
    doc_type: 'node|block'
    nid: '\d+'

# The Media studio's single-item deep link — /atelier/media/<bundle>/<id> (v1:
# image). Its own route rather than the generic {studio}/{doc_type}/{nid} above
# because a media item's URL is /media/<bundle>/<id> (no separate studio+doc_type
# split), and the three segments keep it clear of the flat `/atelier/media/*`
# JSON API (media/{media}/schema · media/{media} · media/{media}/file), whose
# routes all have a different 3rd segment / method. The bundle segment carries the
# planned image|document dispatch (DECISIONS 0144).
aincient_chat.console_media:
  path: '/atelier/media/{bundle}/{nid}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ConsoleController::app'
    _title: 'Atelier'
  requirements:
    _permission: 'use aincient operator console'
    bundle: 'image'
    # A numeric media id, or the `new` sentinel — the id-less "new image" room
    # (generate from scratch). The controller only serves the SPA shell (it reads
    # no id server-side); the client parses the segment and mints the entity on
    # first generation, so `new` is a valid deep link / reload target.
    nid: '\d+|new'

aincient_chat.console_doc_translation:
  path: '/atelier/{studio}/{doc_type}/{nid}/{langcode}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ConsoleController::app'
    _title: 'Atelier'
  requirements:
    _permission: 'use aincient operator console'
    studio: '(?!chat$)[a-z][a-z0-9_-]*'
    doc_type: 'node'
    nid: '\d+'
    langcode: '[a-z][a-z0-9-]*'

# Self-service "My Account" (DECISIONS 0157, Tier 2). A thin JSON API the React
# account pane drives; the target is ALWAYS the signed-in user (no cross-account
# id in any path/body), so the console permission + same-origin cookie is the
# gate. Security (current-password re-auth, validation) lives in the controller,
# not the client. _disable_route_normalizer keeps a redirect module from 301-ing
# a POST and dropping its body (same reasoning as page_save).
aincient_chat.account:
  path: '/atelier/account'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\AccountController::get'
  methods: [GET]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.account_save:
  path: '/atelier/account'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\AccountController::save'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

aincient_chat.account_avatar:
  path: '/atelier/account/avatar'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\AccountController::uploadAvatar'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _disable_route_normalizer: 'TRUE'
    _auth: ['cookie', 'basic_auth']

aincient_chat.account_avatar_delete:
  path: '/atelier/account/avatar'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\AccountController::deleteAvatar'
  methods: [DELETE]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.chat:
  path: '/atelier/chat'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::chat'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    # cookie = the in-browser assistant-ui console; basic_auth = integrations/tests.
    _auth: ['cookie', 'basic_auth']

aincient_chat.interrupt_resolve:
  path: '/atelier/chat/interrupt/{uuid}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::resolveInterrupt'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.threads:
  path: '/atelier/chat/threads'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::threads'
  methods: [GET]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.thread_events:
  path: '/atelier/chat/thread/{thread_id}/events'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::threadEvents'
  methods: [GET]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.thread_archive:
  path: '/atelier/chat/thread/{thread_id}/archive'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::archiveThread'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.thread_lock:
  path: '/atelier/chat/thread/{thread_id}/lock'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::lockThread'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.thread_clear:
  path: '/atelier/chat/thread/{thread_id}/clear'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::clearThread'
  methods: [POST]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.thread_delete:
  path: '/atelier/chat/thread/{thread_id}'
  defaults:
    _controller: 'Drupal\aincient_chat\Controller\ChatController::deleteThread'
  methods: [DELETE]
  requirements:
    _permission: 'use aincient operator console'
  options:
    _auth: ['cookie', 'basic_auth']

aincient_chat.settings:
  path: '/admin/config/atelier-chat'
  defaults:
    _form: 'Drupal\aincient_chat\Form\SettingsForm'
    _title: 'Atelier chat'
  requirements:
    _permission: 'administer aincient chat'
