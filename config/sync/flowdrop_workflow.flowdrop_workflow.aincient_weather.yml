  -
    id: note.1
    position:
      x: -160
      'y': 300
    data:
      label: Note
      config:
        content: |-
          ## Weather Lookup Workflow

          Takes a location string from chat, resolves it to coordinates via the Open-Meteo Geocoding API, fetches a 5-day forecast, and returns a structured weather_card JSON envelope.

          **Flow:** Chat Input → Geocode URL → Geocode API → Validate result → (retry if needed) → Forecast URL → Forecast API → Shape envelope → Chat Output
        noteType: info
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 284
  -
    id: note.2
    position:
      x: 360
      'y': 560
    data:
      label: Note
      config:
        content: |-
          ## Step 1 — Build Geocode URL

          The Data Mapper (geo_url) takes the raw chat message and constructs two geocoding URL variants:
          - **url_full** — uses the full location string (e.g. "New York, NY")
          - **url_first** — uses only the first word/token, as a fallback

          Both are sent to separate HTTP requests in parallel.
        noteType: info
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 304
  -
    id: note.3
    position:
      x: 920
      'y': 720
    data:
      label: Note
      config:
        content: |-
          ## Step 2 — Geocode API (First Try)

          Calls the Open-Meteo Geocoding API with the full location string.

          Endpoint: https://geocoding-api.open-meteo.com/v1/search

          The JSON response is passed to the Data Extractor to check whether results[0].name exists.
        noteType: info
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 284
  -
    id: note.4
    position:
      x: 1860
      'y': 820
    data:
      label: Note
      config:
        content: |-
          ## Step 2b — Geocode API (Second Try)

          Only triggered if the first geocode attempt returned no results (If/Else → False branch).

          Uses the simplified first-token URL from the geo_url mapper as a fallback query.
        noteType: warning
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 244
  -
    id: note.5
    position:
      x: 1180
      'y': -320
    data:
      label: Note
      config:
        content: |-
          ## Step 3 — Validate Geocode Result

          The Data Extractor reads $.results[0].name via JSONPath from the first geocode response.

          The If/Else gateway checks whether the extracted value is not empty:
          - **True** → location found, proceed to forecast
          - **False** → fallback to Second Try geocode request
        noteType: warning
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 304
  -
    id: note.6
    position:
      x: 2400
      'y': 660
    data:
      label: Note
      config:
        content: |-
          ## Step 4 — Build Forecast URL &amp; Fetch

          The post_geo Data Mapper extracts latitude, longitude, and name from the geocode result, then constructs the forecast API URL.

          Endpoint: https://api.open-meteo.com/v1/forecast

          Parameters: current temperature, weather code, wind speed + 5-day daily forecast.
        noteType: info
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 304
  -
    id: note.7
    position:
      x: 3180
      'y': 366
    data:
      label: Note
      config:
        content: |-
          ## Step 5 — Shape Weather Envelope

          The envelope Data Mapper renders the final JSON payload using a Twig template.

          Output structure:
          - __widget__: "weather_card"
          - location.name (geocoded place name)
          - current: temperature, tempMin/Max, conditionCode, windSpeed
          - forecast[]: 5-day array with label, tempMin, tempMax, conditionCode

          WMO weather codes are mapped to human-readable condition strings (clear, rain, snow, thunderstorm, etc.) via an inline Twig dictionary.
        noteType: success
      metadata:
        node_type_id: note
    measured:
      width: 500
      height: 444
