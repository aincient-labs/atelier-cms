            name: q
            label: Query
            description: ''
            dataType: string
            required: false
        dynamicOutputs:
          -
            name: url_full
            label: 'URL Full'
            description: ''
            dataType: string
            required: false
            value: "https://geocoding-api.open-meteo.com/v1/search?name={{ (q|split(',')|first|trim)|url_encode }}&count=1&language=en&format=json"
          -
            name: url_first
            label: 'URL First'
            description: ''
            dataType: string
            required: false
            value: "https://geocoding-api.open-meteo.com/v1/search?name={{ (q|split(',')|first|trim|split(' ')|first)|url_encode }}&count=1&language=en&format=json"
        instanceTitle: geo_url
        instanceDescription: 'builds the geocoding URL'
      metadata:
        node_type_id: data_mapper
      extensions:
        ui:
          hideUnconnectedHandles: true
          portOrder:
            inputs:
