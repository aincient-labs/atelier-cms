id: aincient_weather
label: 'Weather (demo tool)'
description: "A weather lookup. Take the user's chat message as a location. GET the Open-Meteo geocoding API to resolve it to latitude/longitude/name. Then GET the Open-Meteo forecast API for that lat/lon. Reshape the response into a JSON envelope and return it as the chat output."
