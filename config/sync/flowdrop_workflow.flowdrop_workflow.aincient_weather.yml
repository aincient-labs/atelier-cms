            required: false
        dynamicOutputs:
          -
            name: envelop
            label: Envelop
            description: ''
            dataType: string
            required: false
            value: "{% autoescape false %} {% set codes = {0:'clear',1:'partly-cloudy',2:'partly-cloudy',3:'overcast',45:'fog',48:'fog',51:'drizzle',53:'drizzle',55:'drizzle',56:'drizzle',57:'drizzle',61:'rain',63:'rain',65:'heavy-rain',66:'sleet',67:'sleet',71:'snow',73:'snow',75:'snow',77:'snow',80:'rain',81:'heavy-rain',82:'heavy-rain',85:'snow',86:'snow',95:'thunderstorm',96:'thunderstorm',99:'thunderstorm'} %} {   \"__widget__\": \"weather_card\",   \"payload\": {     \"id\": {{ ('weather-' ~ name)|lower|replace({' ': '-'})|json_encode }},     \"location\": { \"name\": {{ name|json_encode }} },     \"units\": { \"temperature\": \"celsius\" },     \"current\": {       \"temperature\": {{ wx.current.temperature_2m }},       \"tempMin\": {{ wx.daily.temperature_2m_min[0] }},       \"tempMax\": {{ wx.daily.temperature_2m_max[0] }},       \"conditionCode\": {{ (codes[wx.current.weather_code]|default('cloudy'))|json_encode }},       \"windSpeed\": {{ wx.current.wind_speed_10m }}     },     \"forecast\": [       {% for i in 0..(wx.daily.time|length - 1) %}       {         \"label\": {{ (wx.daily.time[i]|date('D'))|json_encode }},         \"tempMin\": {{ wx.daily.temperature_2m_min[i] }},         \"tempMax\": {{ wx.daily.temperature_2m_max[i] }},         \"conditionCode\": {{ (codes[wx.daily.weather_code[i]]|default('cloudy'))|json_encode }}       }{{ loop.last ? '' : ',' }}       {% endfor %}     ]   } } {% endautoescape %}"
        instanceTitle: envelope
        instanceDescription: 'the whole widget payload'
