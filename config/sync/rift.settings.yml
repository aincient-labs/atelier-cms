media_source: multiple_image
source: combined_image_style
aspect_ratios:
  - 4x3
  - 16x9
  - 2x1
  - 1x1
config:
  screens:
    xs:
      width: 320
      media: '(max-width: 320px)'
    sm:
      width: 480
      media: '(max-width: 480px)'
    md:
      width: 640
      media: '(max-width: 640px)'
    lg:
      width: 1024
      media: '(max-width: 1024px)'
    xl:
      width: 1280
      media: '(max-width: 1280px)'
  transforms: ''
  multipliers:
    - 1x
    - 2x
  quality:
    1x: 80
    2x: 70
  formats:
    - webp
  attributes:
    loading: lazy
    preload: ''
  fallback_transform: 1280w960h-webp-80
