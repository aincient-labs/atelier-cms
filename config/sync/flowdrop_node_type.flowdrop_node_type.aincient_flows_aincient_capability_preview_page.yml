id: aincient_flows_aincient_capability_preview_page
label: 'Capability: Preview page'
description: 'Edit the page the user is composing in the LIVE page studio by emitting a list of section OPS. This recomposes the preview INSTANTLY and stages it as an unsaved draft — it does NOT publish (the user does that with the Publish button). Use it for every change so the user sees it happen. Ops (JSON array): set_meta {type?,preset?,title?}; add_section {component, props?, after?}; update_section {index, props}; remove_section {index}; reorder {order:[…]}. The current draft and its section indexes are shown in the system prompt as LIVE PAGE STATE; component names + props are listed there too.'
