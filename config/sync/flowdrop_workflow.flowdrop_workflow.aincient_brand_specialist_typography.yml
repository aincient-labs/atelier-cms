id: aincient_brand_specialist_typography
label: 'Brand specialist: Typography'
description: 'Single-pass typography specialist. Takes a typography instruction (+ optional current state), decides the typeface PAIRING and type-scale presets, and returns a brand-preview slice (presets_json/tokens_json/fonts) for the orchestrator to apply via preview_brand. Applies nothing itself; no inner loop.'
nodes:
  -
    id: chat_input.1
    position:
      x: -40
      'y': 0
    data:
      label: 'Chat Input'
      config:
        nodeType: default
      metadata:
        node_type_id: chat_input
      extensions:
        ui:
          hideUnconnectedHandles: true
    measured:
      width: 280
      height: 202
  -
    id: simple_chat.1
    position:
      x: 360
      'y': 0
    data:
      label: 'Typography reasoning'
      config:
        operation_type: 'aincient_role:task'
        model: null
        temperature: 0
        maxTokens: 900
        systemPrompt: |-
          You are the TYPOGRAPHY specialist for AIncient's brand studio. You receive a
          single instruction describing a desired typography change (it may also restate
          the current look). Decide the best typeface PAIRING and type-scale presets, and
          return them. You APPLY NOTHING — you only return a slice for the orchestrator.

          Return ONLY a single JSON object (no prose, no markdown fence). Use any of these
          keys; omit a key you are not setting:
          - "presets_json": an object choosing typography presets by group:
            - pairing — display+body typeface pairing: inter, editorial, geometric,
              technical, warm, corporate, superfamily. (Loads the web fonts for you.)
            - text_size — body reading size: compact, default, large.
            - heading_weight — heading/display heaviness: regular, medium, bold, heavy.
          - "tokens_json": raw font tokens ONLY for a fine adjustment no preset expresses:
            font_family_base, font_family_display, heading_tracking. Prefer presets; only
            hand-pick a font family when the user names a specific family.
          - "fonts": comma-separated Google Font family names to load — ONLY when you set a
            raw font_family token to a custom family.

          Rules:
          - ALWAYS prefer a pairing preset over hand-picking font families. If the user
            names a pairing id (Inter, Editorial, Warm, …), use that exact id; never
            substitute your own fonts.
          - Touch ONLY typography. Do NOT emit colour, radius, shadow, density, or spacing
            tokens — other specialists own those.
          - If the instruction implies no typography change, return {}.

          Example — instruction "use the Warm pairing with heavier headings":
          {"presets_json": {"pairing": "warm", "heading_weight": "heavy"}}
      metadata:
        node_type_id: flowdrop_ai_provider_simple_chat
      extensions:
        ui:
          hideUnconnectedHandles: false
    measured:
      width: 280
      height: 420
