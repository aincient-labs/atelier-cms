id: aincient_flows_aincient_capability_find_reference
label: 'Capability: Find reference'
description: 'Find REAL existing content to reference in a page, returned as a text TOKEN you put straight into a prop. A `media:<id>` token goes in an image / avatar / cover prop; an `entity:node:<id>` token goes in an embed section''s `entity` (append @teaser/@full for a view mode); a `block:<id>` token goes in a block section''s `ref`. Pass "query" to filter and optional "types" (CSV of: media, node, block) to narrow. ALWAYS prefer a media token to a raw image URL. If nothing fits, tell the user to upload the image or author the block in the page studio — do not invent a token.'
