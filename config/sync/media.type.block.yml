id: block
label: 'Global block'
description: 'A reusable GLOBAL BLOCK — a saved page-schema fragment (a shared CTA, banner, footer note) stored as Media so it lives in the Library alongside images and is referenced by the universal media:<id> token. It has no page of its own; its sections are spliced into a host page wherever a slot references it. Edit once, every page using it updates.'
