name: Release image

# Publishes the PUBLIC appliance image to GHCR from the public artifact repo.
#
#   push to main   → :edge        + :sha-<short>   (rolling build; every deploy)
#   push tag v*    → :v1.2.3      + :latest        (pinned release)
#   manual         → workflow_dispatch (publishes whatever ref it's run on)
#
# All three paths produce a native multi-arch (amd64+arm64) manifest.
#
# This repo (aincient-labs/atelier-cms) is the deterministic, history-free snapshot
# of the private aincient-labs/cms produced by the umbrella's bin/deploy-atelier.
# The image is built and published FROM HERE so the public package's source is
# exactly the public tree — what you can read is what got built. The private
# dev repo (cms) keeps its fast PR gate (ci.yml); this workflow re-runs the full
# gate against the published tree before pushing.
#
# The publish is GATED on the smoke test (build → install → upgrade → rollback),
# which now runs on BOTH arches natively: a matrix fans the build/smoke job out
# to a native amd64 runner (ubuntu-latest) and a native arm64 runner
# (ubuntu-24.04-arm — free for public repos). Each runner builds + smoke-tests
# its own arch on real silicon (no QEMU emulation anywhere), then pushes its
# layers to GHCR BY DIGEST. A final `merge` job stitches the two digests into one
# multi-arch manifest and applies the tags. Both :edge and :vX.Y.Z are therefore
# native multi-arch (linux/amd64 + linux/arm64) via the same code path — the tag
# set is the only difference — so Apple-Silicon / arm64 hosts always pull a
# native image, on every build, not just tagged releases.
#
# Image: ghcr.io/aincient-labs/atelier-cms  (PUBLIC package — computed from
# github.repository below, so it always tracks this repo's name).
#
# No repo secrets required: composer authenticates to the GitHub API with the
# built-in GITHUB_TOKEN (rate-limit avoidance only). FlowDrop resolves from
# public drupal.org — the old private FLOWDROP_TOKEN PAT is no longer needed.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the publish on the same PHP Kernel tests CI runs (agent loop +
  # Commands). The smoke test only proves the container installs/upgrades/rolls
  # back; a logic regression that still boots cleanly would otherwise ship to
  # :edge. These are fast sqlite tests, so the extra lane costs little. Runs on
  # every push/tag — publish never happens without it green.
  kernel-tests:
    name: PHP Kernel tests (agent loop + Commands)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, pdo_sqlite, sqlite3, mbstring, dom, xml, curl, intl, zip, bcmath, opcache
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Authenticate composer to the GitHub API via the built-in GITHUB_TOKEN so
      # Packagist dist zipballs (served from api.github.com) don't hit the 60/hr
      # anonymous rate limit. FlowDrop resolves from public drupal.org — no PAT.
      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
        run: composer install --no-interaction --no-progress --prefer-dist

      # Functional (BrowserTestBase) tests in the sweep need a real HTTP server
      # serving the docroot (must start FROM the docroot so the router's
      # DOCUMENT_ROOT resolves index.php).
      - name: Start PHP server for Functional tests
        working-directory: web
        run: php -S 127.0.0.1:8888 .ht.router.php &>/tmp/php-server.log &

      - name: Run Kernel tests
        env:
          SIMPLETEST_BASE_URL: http://127.0.0.1:8888
        run: composer test

  # Guards the appliance's data-safety net: the failure-triggered rollback
  # branches (failed updatedb / config:import / unhealthy upgrade → snapshot
  # restore + abort) that smoke.sh's happy-path scenario can't exercise. Fast
  # (bats + mock drush, no image build), so it fails before the expensive build.
  converge-unit:
    name: Converge unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # run.sh executes the suite in the bats/bats image; Docker is preinstalled.
      - name: Run converge bats suite
        run: bash docker/tests/run.sh

  # Build + smoke-test each arch on its OWN native runner (no QEMU), then push
  # that arch's layers to GHCR by digest. The two arches run in parallel; the
  # `merge` job below assembles them into one manifest. fail-fast:false so a
  # flake on one arch still lets the other finish and surfaces its own failure.
  build:
    name: Build + smoke (${{ matrix.arch }})
    needs: [kernel-tests, converge-unit]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, platform: linux/amd64, runner: ubuntu-latest }
          # Native arm64 — free for public repos. Replaces the old QEMU emulation
          # path, so arm64 builds at native speed and is smoke-tested for real.
          - { arch: arm64, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      # No setup-qemu-action: each arch builds on its own native silicon.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Expose the Actions cache runtime token to plain `run:` steps so smoke.sh's
      # raw `docker buildx build --cache-to type=gha` can reach the cache backend
      # (these vars exist in the job but aren't exported to shell steps by default).
      - name: Expose GHA cache to buildx
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Builds aincient/cms:smoke for THIS arch (gha-cached, per-arch scope) and
      # runs install → upgrade → rollback against a real container on native
      # silicon. Exits non-zero on any failure, which fails the job before
      # anything is pushed. The cached vendor (composer) + apt layers are reused
      # across runs. Per-arch cache scope keeps the two arches from clobbering
      # each other's layers.
      - name: Smoke-test the appliance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AINCIENT_BUILD_CACHE: gha
          AINCIENT_BUILD_CACHE_SCOPE: appliance-${{ matrix.arch }}
        run: bash docker/tests/smoke.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push THIS arch to GHCR by digest (no tag yet — tags are applied by the
      # merge job). Every layer cache-hits from the smoke build above (same
      # per-arch scope), so this is a push-only step, not a rebuild — the
      # published bytes are the smoke-validated bytes. push-by-digest lets the
      # merge job assemble a manifest list from the two arches' digests.
      #
      # composer install inside the Docker build authenticates to the GitHub API
      # via the same BuildKit secret the Dockerfile + smoke build use
      # (id=composer_github_token), fed the built-in GITHUB_TOKEN.
      - name: Push by digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          docker buildx build \
            --secret "id=composer_github_token,env=GITHUB_TOKEN" \
            --cache-from "type=gha,scope=appliance-${{ matrix.arch }}" \
            -f docker/Dockerfile \
            --output "type=image,name=${IMAGE},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/meta.json \
            .
          mkdir -p /tmp/digests
          digest="$(jq -r '."containerimage.digest"' /tmp/meta.json)"
          touch "/tmp/digests/${digest#sha256:}"
          echo "pushed ${IMAGE}@${digest} (${{ matrix.platform }})" >> "$GITHUB_STEP_SUMMARY"

      # Each arch uploads a marker file named for its image digest; the merge job
      # downloads both to reconstruct the digest list.
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the two per-arch digests into one multi-arch manifest and apply the
  # tags. This is the only place tags are set, so :edge and :vX.Y.Z share one
  # code path — the ref decides the tag set, nothing else.
  merge:
    name: Merge manifest + tag
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # github.repository is already owner/repo (aincient-labs/atelier-cms); lowercase
      # it defensively for GHCR so this publishes ghcr.io/aincient-labs/atelier-cms
      # without hardcoding the name. imagetools create builds the manifest list
      # from the per-arch digests (no rebuild — pure registry-side assembly).
      #
      #   v* tag         → :vX.Y.Z + :latest
      #   main / dispatch → :edge   + :sha-<short>
      - name: Create + push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS=("${{ github.ref_name }}" "latest")
          else
            TAGS=("edge" "sha-${GITHUB_SHA::7}")
          fi
          tag_args=(); for t in "${TAGS[@]}"; do tag_args+=(-t "${IMAGE}:${t}"); done
          docker buildx imagetools create "${tag_args[@]}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${TAGS[0]}"
          echo "${IMAGE}:${TAGS[0]} (linux/amd64, linux/arm64 — native, smoke-validated)" >> "$GITHUB_STEP_SUMMARY"
